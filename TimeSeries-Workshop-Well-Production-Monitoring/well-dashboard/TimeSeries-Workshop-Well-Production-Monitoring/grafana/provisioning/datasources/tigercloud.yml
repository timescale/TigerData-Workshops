apiVersion: 1
datasources:
  - name: Tiger Cloud
    type: postgres
    uid: tigercloud
    url: <your-service-host>:<port>          # e.g. abc123.tsdb.cloud.timescale.com:34095
    database: tsdb
    user: tsdbadmin
    editable: true
    secureJsonData:
      password: <your-password>
    jsonData:
      sslmode: require
      postgresVersion: 1600
      timescaledb: true
